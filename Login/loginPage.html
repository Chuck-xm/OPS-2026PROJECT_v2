<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Log In</title>
    <link rel="stylesheet" href="loginPage.css" />
  </head>
  <body>
    <h1 id="LogoText">OPS</h1>
    <div class="container">
      <div class="left-panel">
        <h2 id="form-title">Welcome Back</h2>
        <p class="subtitle">Log in to continue buying or selling.</p>

        <button class="google-login" id="google-login-btn" type="button">
          <img
            src="Images/google icon.png"
            alt="Google Logo"
            class="google-logo"
          />
          <!-- Image needed: Login/Images/google icon.png -->
          Log in with Google
        </button>
        <div class="divider">or</div>

        <form id="login-form" novalidate>
          <div>
            <label for="identifier">Email or Phone</label>
            <input
              type="text"
              id="identifier"
              placeholder="Enter your email or phone"
              required
            />
            <span id="identifierError" class="error-message">
              Please enter a valid email or phone number
            </span>
          </div>
          <div>
            <label for="password">Password</label>
            <div class="password-container">
              <input
                type="password"
                id="password"
                placeholder="Enter your password"
                required
              />
              <img
                id="togglePassword"
                class="toggle-password"
                src="Images/hidden password.png"
                alt="Toggle Password Visibility"
              />
              <!-- Image needed: Login/Images/hidden password.png -->
              <!-- Image needed: Login/Images/show password.png -->
            </div>
            <span id="passwordError" class="error-message">
              Incorrect password
            </span>
          </div>
          <div class="form-options">
            <label>
              <input type="checkbox" id="rememberMe" />
              Remember me
            </label>
            <a href="passwordReset/passwordReset.html" id="forgotPassword">Forgot Password?</a>
          </div>
          <button type="submit" class="login-btn">Log In</button>
        </form>
        <p class="signup-link">
          Don't have an account?
          <a href="../index.html">Sign up</a>
        </p>
      </div>
    </div>
    <script src="../media.js"></script>
    <script src="loginPage.js"></script>
  </body>
</html>
